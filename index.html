<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequeños Genios - Juegos Educativos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Quicksand', sans-serif; }
        .font-fredoka { font-family: 'Fredoka One', cursive; }
        .card { perspective: 1000px; }
        .card-inner { transition: transform 0.5s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; width: 100%; height: 100%; }
        .card-back { transform: rotateY(180deg); }
        @keyframes shake {
            10%, 90% { transform: translateX(-2px); }
            20%, 80% { transform: translateX(2px); }
            30%, 50%, 70% { transform: translateX(-4px); }
            40%, 60% { transform: translateX(4px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.3s ease-out; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-cyan-400 via-blue-400 to-violet-500">
    <div id="app" class="min-h-screen"></div>

    <script>
        const DB_KEY = 'pequenos_genios_db';
        
        const emojis = {
            avatares: ['😊', '🚀', '🌟', '🎮'],
            memoria: ['🐱', '🐶', '🦁', '🐸', '🦊', '🐼', '🐨', '🦄'],
            frutas: '🍎'
        };

        function initDB() {
            const data = localStorage.getItem(DB_KEY);
            if (!data) {
                const inicial = { ninos: [], sesion: null, progreso: [] };
                localStorage.setItem(DB_KEY, JSON.stringify(inicial));
                return inicial;
            }
            return JSON.parse(data);
        }

        function getDB() {
            return JSON.parse(localStorage.getItem(DB_KEY));
        }

        function saveDB(data) {
            localStorage.setItem(DB_KEY, JSON.stringify(data));
        }

        function getSesion() {
            const db = getDB();
            return db.sesion;
        }

        function setSesion(nino) {
            const db = getDB();
            db.sesion = nino;
            saveDB(db);
        }

        function getNinos() {
            return getDB().ninos;
        }

        function addNino(nino) {
            const db = getDB();
            nino.id = Date.now();
            nino.created = new Date().toISOString();
            db.ninos.push(nino);
            saveDB(db);
            return nino;
        }

        function actualizarProgreso(ninoId, categoria, puntos) {
            const db = getDB();
            let progreso = db.progreso.find(p => p.nino_id === ninoId && p.categoria === categoria);
            if (progreso) {
                progreso.puntos += puntos;
                progreso.fecha = new Date().toISOString();
            } else {
                db.progreso.push({
                    nino_id: ninoId,
                    categoria: categoria,
                    puntos: puntos,
                    fecha: new Date().toISOString()
                });
            }
            saveDB(db);
        }

        function getAllProgreso(ninoId) {
            const db = getDB();
            return db.progreso.filter(p => p.nino_id === ninoId);
        }

        function navigate(screen) {
            const app = document.getElementById('app');
            app.innerHTML = '';
            
            switch(screen) {
                case 'selector': renderSelector(app); break;
                case 'menu': renderMenu(app); break;
                case 'letras': renderLetras(app); break;
                case 'numeros': renderNumeros(app); break;
                case 'colores': renderColores(app); break;
                case 'memoria': renderMemoria(app); break;
                case 'registro': renderRegistro(app); break;
                case 'progreso': renderProgreso(app); break;
            }
        }

        function renderSelector(container) {
            const ninos = getNinos();
            const sesion = getSesion();
            
            let html = `
                <div class="min-h-screen flex flex-col items-center justify-center p-4">
                    <header class="mb-10 rounded-3xl bg-white/80 p-8 shadow-2xl shadow-violet-500/20 backdrop-blur text-center w-full max-w-2xl">
                        <h1 class="text-4xl sm:text-5xl font-fredoka text-slate-900">¡Bienvenido!</h1>
                        <p class="mt-3 text-lg text-slate-600">Elige tu perfil para comenzar la aventura</p>
                    </header>
            `;

            if (ninos.length > 0) {
                html += `<div class="grid gap-6 sm:grid-cols-2 w-full max-w-2xl">`;
                ninos.forEach(nino => {
                    html += `
                        <button onclick="setSesion(${JSON.stringify(nino).replace(/"/g, '&quot;')}); navigate('menu');" 
                            class="group rounded-[32px] border border-white/50 bg-white/90 p-6 shadow-xl shadow-slate-900/10 transition hover:-translate-y-1 hover:shadow-2xl text-left">
                            <div class="flex items-center gap-4">
                                <div class="flex h-20 w-20 items-center justify-center rounded-3xl bg-gradient-to-br from-fuchsia-500 to-amber-300 text-4xl text-white shadow-lg">
                                    ${nino.avatar}
                                </div>
                                <div>
                                    <p class="text-lg font-semibold text-slate-900">${nino.nombre}</p>
                                    <p class="text-sm text-slate-500">Toca para continuar</p>
                                </div>
                            </div>
                        </button>
                    `;
                });
                html += `</div>`;
            } else {
                html += `
                    <section class="rounded-3xl bg-white/90 p-10 shadow-2xl w-full max-w-2xl text-center">
                        <h2 class="text-3xl font-bold text-slate-900">Aún no hay perfiles</h2>
                        <p class="mt-4 text-slate-600">Crea el primer perfil y comienza a explorar</p>
                    </section>
                `;
            }

            html += `
                <div class="mt-8">
                    <button onclick="navigate('registro')" class="inline-flex rounded-full bg-fuchsia-600 px-8 py-4 text-base font-semibold text-white shadow-lg shadow-fuchsia-600/30 transition hover:bg-fuchsia-500">
                        ${ninos.length === 0 ? 'Crear primer perfil' : 'Crear nuevo perfil'}
                    </button>
                </div>
            </div>
            `;
            
            container.innerHTML = html;
        }

        function renderMenu(container) {
            const sesion = getSesion();
            if (!sesion) return navigate('selector');
            
            const progreso = getAllProgreso(sesion.id);
            const getPuntos = (cat) => {
                const p = progreso.find(x => x.categoria === cat);
                return p ? p.puntos : 0;
            };

            container.innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center p-4">
                    <div class="bg-white/90 backdrop-blur rounded-3xl p-8 shadow-2xl w-full max-w-md text-center">
                        <h1 class="text-3xl font-fredoka text-violet-600 mb-2">¡Hola, ${sesion.nombre}!</h1>
                        <p class="text-slate-500 mb-8">Elige un juego para comenzar</p>

                        <div class="space-y-4">
                            <button onclick="navigate('letras')" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-6 rounded-2xl shadow-lg transition flex items-center justify-center gap-3">
                                <span class="text-2xl">🔤</span>
                                <span>Letras</span>
                                <span class="bg-blue-700 text-xs px-2 py-1 rounded-full">${getPuntos('letras')} pts</span>
                            </button>

                            <button onclick="navigate('numeros')" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-6 rounded-2xl shadow-lg transition flex items-center justify-center gap-3">
                                <span class="text-2xl">🔢</span>
                                <span>Números</span>
                                <span class="bg-green-700 text-xs px-2 py-1 rounded-full">${getPuntos('numeros')} pts</span>
                            </button>

                            <button onclick="navigate('colores')" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-6 rounded-2xl shadow-lg transition flex items-center justify-center gap-3">
                                <span class="text-2xl">🎨</span>
                                <span>Colores</span>
                                <span class="bg-red-700 text-xs px-2 py-1 rounded-full">${getPuntos('colores')} pts</span>
                            </button>

                            <button onclick="navigate('memoria')" class="w-full bg-purple-500 hover:bg-purple-600 text-white font-bold py-4 px-6 rounded-2xl shadow-lg transition flex items-center justify-center gap-3">
                                <span class="text-2xl">🧠</span>
                                <span>Memoria</span>
                                <span class="bg-purple-700 text-xs px-2 py-1 rounded-full">${getPuntos('memoria')} pts</span>
                            </button>
                        </div>

                        <div class="mt-8 flex gap-4 justify-center">
                            <button onclick="navigate('progreso')" class="bg-amber-400 hover:bg-amber-500 text-white font-bold py-2 px-4 rounded-full">
                                📊 Mi Progreso
                            </button>
                            <button onclick="setSesion(null); navigate('selector');" class="bg-slate-300 hover:bg-slate-400 text-slate-700 font-bold py-2 px-4 rounded-full">
                                Cambiar Perfil
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderRegistro(container) {
            container.innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center p-4">
                    <div class="bg-white/90 backdrop-blur rounded-3xl p-8 shadow-2xl w-full max-w-md">
                        <h1 class="text-3xl font-fredoka text-slate-900 mb-2">Crear perfil</h1>
                        <p class="text-slate-600 mb-6">Registra tu nombre y elige un avatar</p>

                        <div class="space-y-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Nombre</label>
                                <input type="text" id="input-nombre" class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-base focus:border-orange-400 focus:ring-2 focus:ring-orange-200 outline-none" placeholder="Escribe tu nombre" />
                            </div>

                            <div>
                                <p class="text-sm font-semibold text-slate-700 mb-3">Elige un avatar</p>
                                <div class="grid grid-cols-4 gap-3" id="avatares-container">
                                    ${emojis.avatares.map((e, i) => `
                                        <button type="button" onclick="selectAvatar(${i})" class="avatar-btn h-16 rounded-2xl text-3xl bg-slate-100 hover:bg-orange-100 border-2 border-transparent transition" data-idx="${i}">${e}</button>
                                    `).join('')}
                                </div>
                            </div>

                            <div class="flex gap-3">
                                <button onclick="guardarNuevoPerfil()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-2xl transition">Guardar</button>
                                <button onclick="navigate('selector')" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-2xl transition">Volver</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        let avatarSeleccionado = 0;
        
        function selectAvatar(idx) {
            avatarSeleccionado = idx;
            document.querySelectorAll('.avatar-btn').forEach((btn, i) => {
                if (i === idx) {
                    btn.classList.add('border-orange-500', 'bg-orange-100');
                    btn.classList.remove('border-transparent', 'bg-slate-100');
                } else {
                    btn.classList.remove('border-orange-500', 'bg-orange-100');
                    btn.classList.add('border-transparent', 'bg-slate-100');
                }
            });
        }

        function guardarNuevoPerfil() {
            const nombre = document.getElementById('input-nombre').value.trim();
            if (!nombre) {
                alert('Por favor escribe tu nombre');
                return;
            }
            const nino = { nombre: nombre, avatar: emojis.avatares[avatarSeleccionado] };
            const nuevo = addNino(nino);
            setSesion(nuevo);
            navigate('menu');
        }

        function renderProgreso(container) {
            const sesion = getSesion();
            if (!sesion) return navigate('selector');
            
            const progreso = getAllProgreso(sesion.id);
            const cats = [
                { id: 'letras', nombre: 'Letras', icono: '🔤', color: 'blue' },
                { id: 'numeros', nombre: 'Números', icono: '🔢', color: 'green' },
                { id: 'colores', nombre: 'Colores', icono: '🎨', color: 'red' },
                { id: 'memoria', nombre: 'Memoria', icono: '🧠', color: 'purple' }
            ];

            let html = `
                <div class="min-h-screen flex flex-col items-center justify-center p-4">
                    <div class="bg-white/90 backdrop-blur rounded-3xl p-8 shadow-2xl w-full max-w-md">
                        <div class="flex justify-between items-center mb-6">
                            <h1 class="text-2xl font-fredoka text-slate-900">📊 Mi Progreso</h1>
                            <button onclick="navigate('menu')" class="text-slate-500 hover:text-slate-700">✕</button>
                        </div>

                        <div class="space-y-4">
            `;

            cats.forEach(cat => {
                const p = progreso.find(x => x.categoria === cat.id);
                const pts = p ? p.puntos : 0;
                const estrellas = Math.floor(pts / 50);
                
                html += `
                    <div class="bg-${cat.color}-50 rounded-2xl p-4 border border-${cat.color}-200">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xl">${cat.icono}</span>
                            <span class="text-2xl font-bold text-${cat.color}-600">${pts}</span>
                        </div>
                        <div class="flex gap-1">
                            ${[1,2,3,4,5].map(i => `<span class="text-xl ${i <= estrellas ? 'text-yellow-400' : 'text-slate-300'}">★</span>`).join('')}
                        </div>
                    </div>
                `;
            });

            html += `
                        </div>
                        <button onclick="navigate('menu')" class="w-full mt-6 bg-violet-500 hover:bg-violet-600 text-white font-bold py-3 rounded-2xl">Volver al Menú</button>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        // ==================== JUEGO DE LETRAS ====================
        function renderLetras(container) {
            const sesion = getSesion();
            if (!sesion) return navigate('selector');
            
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            let currentLetter = "";

            container.innerHTML = `
                <div class="min-h-screen flex flex-col items-center p-4">
                    <header class="w-full max-w-2xl flex justify-between items-center mb-6">
                        <button onclick="navigate('menu')" class="bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-2 px-4 rounded-full shadow-lg">← Volver</button>
                        <div class="bg-white px-4 py-2 rounded-2xl shadow-sm">
                            <span class="text-lg text-green-600 font-bold">Jugando: ${sesion.nombre}</span>
                        </div>
                    </header>

                    <main class="bg-white rounded-[3rem] shadow-2xl p-8 w-full max-w-2xl text-center border-4 border-dashed border-green-200">
                        <h1 class="font-fredoka text-4xl text-green-500 mb-6">¿Qué letra es esta?</h1>
                        
                        <div id="target-letter" class="text-9xl text-indigo-600 font-bold mb-10 p-10 bg-indigo-50 rounded-2xl inline-block shadow-inner">?</div>

                        <div id="options-container" class="grid grid-cols-3 gap-4"></div>
                        <div id="feedback" class="mt-8 h-8 text-2xl font-bold"></div>
                    </main>

                    <div id="modal-success" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                        <div class="bg-white p-8 rounded-3xl text-center shadow-2xl scale-110">
                            <h2 class="font-fredoka text-4xl text-yellow-500 mb-4">¡Genial! 🌟</h2>
                            <p class="text-xl mb-6">Has ganado 10 puntos</p>
                            <div class="flex flex-col gap-3">
                                <button onclick="initLetras()" class="bg-green-500 text-white px-8 py-3 rounded-full font-bold text-xl hover:bg-green-600 shadow-lg">Seguir Jugando</button>
                                <button onclick="navigate('menu')" class="bg-slate-300 text-slate-700 px-8 py-3 rounded-full font-bold text-xl hover:bg-slate-400">Volver al Menú</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            function initLetras() {
                currentLetter = alphabet[Math.floor(Math.random() * alphabet.length)];
                document.getElementById('target-letter').innerText = currentLetter;
                document.getElementById('target-letter').classList.add('pop');
                setTimeout(() => document.getElementById('target-letter').classList.remove('pop'), 300);
                
                let options = [currentLetter];
                while(options.length < 3) {
                    let randomLet = alphabet[Math.floor(Math.random() * alphabet.length)];
                    if(!options.includes(randomLet)) options.push(randomLet);
                }
                options.sort(() => Math.random() - 0.5);

                const container = document.getElementById('options-container');
                container.innerHTML = "";
                options.forEach(letra => {
                    const btn = document.createElement('button');
                    btn.className = "text-5xl font-bold p-6 bg-white border-4 border-indigo-200 rounded-2xl shadow-md text-indigo-500 hover:bg-indigo-50 transition";
                    btn.innerText = letra;
                    btn.onclick = () => checkAnswerLetras(letra, btn);
                    container.appendChild(btn);
                });
                
                document.getElementById('feedback').innerText = "";
                document.getElementById('modal-success').classList.add('hidden');
            }

            function checkAnswerLetras(selected, element) {
                if (selected === currentLetter) {
                    element.classList.add('bg-green-400', 'border-green-600', 'text-white');
                    document.getElementById('feedback').innerText = "¡Correcto! +10 puntos";
                    document.getElementById('feedback').className = "mt-8 h-8 text-2xl font-bold text-green-500";
                    actualizarProgreso(sesion.id, 'letras', 10);
                    setTimeout(() => {
                        document.getElementById('modal-success').classList.remove('hidden');
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                    }, 500);
                } else {
                    element.classList.add('bg-red-400', 'border-red-600', 'text-white', 'shake');
                    document.getElementById('feedback').innerText = "¡Inténtalo de nuevo!";
                    document.getElementById('feedback').className = "mt-8 h-8 text-2xl font-bold text-red-500";
                    setTimeout(() => {
                        element.classList.remove('bg-red-400', 'border-red-600', 'text-white', 'shake');
                    }, 1000);
                }
            }

            initLetras();
            window.initLetras = initLetras;
        }

        // ==================== JUEGO DE NÚMEROS ====================
        function renderNumeros(container) {
            const sesion = getSesion();
            if (!sesion) return navigate('selector');
            
            let correctAnswer = 0;

            container.innerHTML = `
                <div class="min-h-screen flex flex-col items-center p-4">
                    <header class="w-full max-w-2xl flex justify-between items-center mb-6">
                        <button onclick="navigate('menu')" class="bg-orange-400 hover:bg-orange-500 text-white font-bold py-2 px-6 rounded-full shadow-lg">← Volver</button>
                        <div class="bg-white px-4 py-2 rounded-2xl shadow-sm border-2 border-orange-100">
                            <span class="text-lg text-orange-600 font-bold">¡A contar, ${sesion.nombre}!</span>
                        </div>
                    </header>

                    <main class="bg-white rounded-[3rem] shadow-xl p-8 w-full max-w-2xl text-center border-b-8 border-orange-200">
                        <h1 class="font-fredoka text-3xl text-orange-500 mb-8">¿Cuántas manzanas hay?</h1>
                        
                        <div id="items-container" class="flex flex-wrap justify-center items-center gap-4 min-h-[180px] mb-12 p-6 bg-orange-50 rounded-3xl"></div>

                        <div id="options-grid" class="grid grid-cols-5 gap-3"></div>
                        <div id="message" class="mt-8 h-10 text-2xl font-bold"></div>
                    </main>

                    <div id="modal-win" class="hidden fixed inset-0 bg-orange-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                        <div class="bg-white p-10 rounded-[3rem] text-center shadow-2xl border-4 border-orange-400">
                            <div class="text-7xl mb-4">🍎✨</div>
                            <h2 class="font-fredoka text-4xl text-orange-500 mb-2">¡Excelente!</h2>
                            <p class="text-gray-600 text-xl mb-8">Contaste muy bien las manzanas.</p>
                            <div class="flex flex-col gap-3">
                                <button onclick="setupNumeros()" class="bg-green-500 hover:bg-green-600 text-white text-2xl font-bold px-12 py-4 rounded-full shadow-xl transition-all">¡Jugar otra vez!</button>
                                <button onclick="navigate('menu')" class="bg-slate-300 text-slate-700 text-2xl font-bold px-12 py-4 rounded-full shadow-xl transition-all">Volver al Menú</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            function setupNumeros() {
                const container = document.getElementById('items-container');
                const optionsGrid = document.getElementById('options-grid');
                const message = document.getElementById('message');
                const modal = document.getElementById('modal-win');

                container.innerHTML = '';
                optionsGrid.innerHTML = '';
                message.innerText = '';
                modal.classList.add('hidden');

                correctAnswer = Math.floor(Math.random() * 10) + 1;

                for (let i = 0; i < correctAnswer; i++) {
                    const apple = document.createElement('span');
                    apple.className = 'text-6xl pop select-none';
                    apple.innerText = '🍎';
                    container.appendChild(apple);
                }

                for (let i = 1; i <= 10; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'bg-white border-4 border-orange-100 hover:border-orange-400 text-orange-500 text-3xl font-bold py-4 rounded-2xl shadow-sm transition hover:-translate-y-1';
                    btn.innerText = i;
                    btn.onclick = () => checkResultNumeros(i, btn);
                    optionsGrid.appendChild(btn);
                }
            }

            function checkResultNumeros(selected, btn) {
                if (selected === correctAnswer) {
                    btn.classList.replace('border-orange-100', 'bg-green-500');
                    btn.classList.add('text-white', 'border-green-600');
                    actualizarProgreso(sesion.id, 'numeros', 10);
                    document.getElementById('modal-win').classList.remove('hidden');
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                } else {
                    btn.classList.add('bg-red-100', 'border-red-400', 'shake');
                    document.getElementById('message').innerText = "¡Sigue contando! 🧐";
                    document.getElementById('message').className = "mt-8 h-10 text-2xl font-bold text-red-400";
                    setTimeout(() => {
                        btn.classList.remove('bg-red-100', 'border-red-400', 'shake');
                    }, 800);
                }
            }

            setupNumeros();
            window.setupNumeros = setupNumeros;
        }

        // ==================== JUEGO DE COLORES ====================
        function renderColores(container) {
            const sesion = getSesion();
            if (!sesion) return navigate('selector');
            
            let color1 = null;
            let color2 = null;
            const mezclaValida = {
                'rojo+azul': 'morado',
                'azul+rojo': 'morado',
                'rojo+amarillo': 'naranja',
                'amarillo+rojo': 'naranja',
                'azul+amarillo': 'verde',
                'amarillo+azul': 'verde'
            };
            const nombresColores = {
                'rojo': 'Rojo',
                'azul': 'Azul', 
                'amarillo': 'Amarillo',
                'morado': 'Morado',
                'naranja': 'Naranja',
                'verde': 'Verde'
            };

            container.innerHTML = `
                <div class="min-h-screen flex flex-col items-center p-4">
                    <header class="w-full max-w-2xl flex justify-between items-center mb-6">
                        <button onclick="navigate('menu')" class="bg-rose-400 hover:bg-rose-500 text-white font-bold py-2 px-4 rounded-full shadow-lg">← Volver</button>
                        <div class="bg-white px-4 py-2 rounded-2xl shadow-sm">
                            <span class="text-lg text-rose-600 font-bold">Mezclador: ${sesion.nombre}</span>
                        </div>
                    </header>

                    <main class="bg-white rounded-[3rem] shadow-2xl p-8 w-full max-w-2xl text-center">
                        <h1 class="font-fredoka text-3xl text-rose-500 mb-6">Mezclador Mágico de Colores</h1>
                        <p class="text-slate-600 mb-6">Toca dos colores para mezclarlos</p>

                        <div class="flex justify-center gap-8 mb-8">
                            <div id="color-slot-1" class="w-24 h-24 rounded-full bg-slate-200 border-4 border-slate-300 flex items-center justify-center text-slate-400 text-3xl shadow-inner">?</div>
                            <span class="text-4xl text-slate-400 self-center">+</span>
                            <div id="color-slot-2" class="w-24 h-24 rounded-full bg-slate-200 border-4 border-slate-300 flex items-center justify-center text-slate-400 text-3xl shadow-inner">?</div>
                        </div>

                        <div id="result-container" class="hidden mb-8">
                            <div id="color-result" class="w-32 h-32 rounded-full mx-auto shadow-2xl flex items-center justify-center text-white text-xl font-bold"></div>
                        </div>

                        <div class="grid grid-cols-3 gap-4">
                            <button onclick="seleccionarColor('rojo')" class="color-btn h-20 rounded-2xl bg-red-500 text-white text-2xl font-bold shadow-lg transition hover:scale-105" data-color="rojo">🔴</button>
                            <button onclick="seleccionarColor('azul')" class="color-btn h-20 rounded-2xl bg-blue-500 text-white text-2xl font-bold shadow-lg transition hover:scale-105" data-color="azul">🔵</button>
                            <button onclick="seleccionarColor('amarillo')" class="color-btn h-20 rounded-2xl bg-yellow-400 text-white text-2xl font-bold shadow-lg transition hover:scale-105" data-color="amarillo">🟡</button>
                        </div>

                        <div id="feedback-colores" class="mt-6 text-xl font-bold h-8"></div>

                        <button id="btn-volver-colores" onclick="navigate('menu')" class="hidden mt-4 bg-slate-300 hover:bg-slate-400 text-slate-700 font-bold py-2 px-6 rounded-full">
                            Volver al Menú
                        </button>
                    </main>
                </div>
            `;

            function seleccionarColor(color) {
                const slot1 = document.getElementById('color-slot-1');
                const slot2 = document.getElementById('color-slot-2');
                const resultContainer = document.getElementById('result-container');
                const feedback = document.getElementById('feedback-colores');
                const btnVolver = document.getElementById('btn-volver-colores');

                if (btnVolver) btnVolver.classList.add('hidden');

                if (!color1) {
                    color1 = color;
                    slot1.className = `w-24 h-24 rounded-full border-4 border-white shadow-inner transition-all ${color === 'rojo' ? 'bg-red-500' : color === 'azul' ? 'bg-blue-500' : 'bg-yellow-400'}`;
                    slot1.innerText = '';
                    resultContainer.classList.add('hidden');
                } else if (!color2) {
                    color2 = color;
                    slot2.className = `w-24 h-24 rounded-full border-4 border-white shadow-inner transition-all ${color === 'rojo' ? 'bg-red-500' : color === 'azul' ? 'bg-blue-500' : 'bg-yellow-400'}`;
                    slot2.innerText = '';

                    const key = `${color1}+${color2}`;
                    const resultado = mezclaValida[key];

                    if (resultado) {
                        const resultDiv = document.getElementById('color-result');
                        resultContainer.classList.remove('hidden');
                        resultDiv.className = `w-32 h-32 rounded-full mx-auto shadow-2xl flex items-center justify-center text-white text-xl font-bold animate-bounce ${
                            resultado === 'morado' ? 'bg-purple-500' : resultado === 'naranja' ? 'bg-orange-500' : 'bg-green-500'
                        }`;
                        resultDiv.innerText = nombresColores[resultado];
                        
                        feedback.innerText = `¡Felicidades! Has creado ${nombresColores[resultado]} 🎉`;
                        feedback.className = "mt-6 text-xl font-bold text-green-500";
                        
                        actualizarProgreso(sesion.id, 'colores', 10);
                        confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 } });

                        if (btnVolver) btnVolver.classList.remove('hidden');
                    } else {
                        feedback.innerText = "Intenta de nuevo";
                        feedback.className = "mt-6 text-xl font-bold text-red-400";
                    }

                    setTimeout(() => {
                        color1 = null;
                        color2 = null;
                        slot1.className = "w-24 h-24 rounded-full bg-slate-200 border-4 border-slate-300 flex items-center justify-center text-slate-400 text-3xl shadow-inner";
                        slot1.innerText = '?';
                        slot2.className = "w-24 h-24 rounded-full bg-slate-200 border-4 border-slate-300 flex items-center justify-center text-slate-400 text-3xl shadow-inner";
                        slot2.innerText = '?';
                        resultContainer.classList.add('hidden');
                        feedback.innerText = '';
                    }, 2000);
                }
            }

            window.seleccionarColor = seleccionarColor;
        }

        // ==================== JUEGO DE MEMORIA ====================
        function renderMemoria(container) {
            const sesion = getSesion();
            if (!sesion) return navigate('selector');
            
            let primeraCarta = null;
            let segundaCarta = null;
            let bloqueado = false;
            let encontradas = 0;

            const pares = emojis.memoria.slice(0, 4);
            
            container.innerHTML = `
                <div class="min-h-screen flex flex-col items-center p-4">
                    <header class="w-full max-w-2xl flex justify-between items-center mb-6">
                        <button onclick="navigate('menu')" class="bg-purple-400 hover:bg-purple-500 text-white font-bold py-2 px-4 rounded-full shadow-lg">← Volver</button>
                        <div class="bg-white px-4 py-2 rounded-2xl shadow-sm">
                            <span class="text-lg text-purple-600 font-bold">Memoria: ${sesion.nombre}</span>
                        </div>
                    </header>

                    <main class="bg-white rounded-[3rem] shadow-2xl p-8 w-full max-w-2xl text-center">
                        <h1 class="font-fredoka text-3xl text-purple-500 mb-6">🧠 Encuentra los pares</h1>
                        <p class="text-slate-600 mb-6">Parejas encontradas: <span id="contador-parejas" class="font-bold text-purple-600">0</span>/4</p>

                        <div id="grid-memoria" class="grid grid-cols-4 gap-3 max-w-sm mx-auto"></div>
                        <div id="feedback-memoria" class="mt-6 h-8 text-xl font-bold"></div>
                    </main>

                    <div id="modal-memoria" class="hidden fixed inset-0 bg-purple-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                        <div class="bg-white p-10 rounded-[3rem] text-center shadow-2xl border-4 border-purple-400">
                            <div class="text-7xl mb-4">🧠✨</div>
                            <h2 class="font-fredoka text-4xl text-purple-500 mb-2">¡Excelente!</h2>
                            <p class="text-gray-600 text-xl mb-8">Encontraste todos los pares</p>
                            <div class="flex flex-col gap-3">
                                <button onclick="setupMemoria()" class="bg-green-500 hover:bg-green-600 text-white text-2xl font-bold px-12 py-4 rounded-full shadow-xl transition-all">¡Jugar otra vez!</button>
                                <button onclick="navigate('menu')" class="bg-slate-300 text-slate-700 text-2xl font-bold px-12 py-4 rounded-full shadow-xl transition-all">Volver al Menú</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            function setupMemoria() {
                const grid = document.getElementById('grid-memoria');
                grid.innerHTML = '';
                primeraCarta = null;
                segundaCarta = null;
                bloqueado = false;
                encontradas = 0;
                document.getElementById('contador-parejas').innerText = '0';
                document.getElementById('feedback-memoria').innerText = '';
                document.getElementById('modal-memoria').classList.add('hidden');

                let items = [...pares, ...pares];
                items.sort(() => Math.random() - 0.5);

                items.forEach((emoji, idx) => {
                    const card = document.createElement('div');
                    card.className = 'card h-20 cursor-pointer relative';
                    card.innerHTML = `
                        <div class="card-inner relative w-full h-full">
                            <div class="card-front absolute w-full h-full bg-purple-500 rounded-2xl flex items-center justify-center text-3xl text-white shadow-lg">?</div>
                            <div class="card-back absolute w-full h-full bg-white border-4 border-purple-300 rounded-2xl flex items-center justify-center text-3xl">${emoji}</div>
                        </div>
                    `;
                    card.onclick = () => clickCarta(idx, emoji, card);
                    grid.appendChild(card);
                });
            }

            function clickCarta(idx, emoji, cardEl) {
                if (bloqueado) return;
                if (cardEl.classList.contains('flipped')) return;

                cardEl.classList.add('flipped');

                if (!primeraCarta) {
                    primeraCarta = { idx, emoji, el: cardEl };
                } else {
                    segundaCarta = { idx, emoji, el: cardEl };
                    bloqueado = true;

                    if (primeraCarta.emoji === segundaCarta.emoji) {
                        primeraCarta.el.classList.add('encontrada');
                        segundaCarta.el.classList.add('encontrada');
                        encontradas++;
                        document.getElementById('contador-parejas').innerText = encontradas;
                        
                        if (encontradas === 4) {
                            actualizarProgreso(sesion.id, 'memoria', 10);
                            document.getElementById('modal-memoria').classList.remove('hidden');
                            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                        }
                        
                        primeraCarta = null;
                        segundaCarta = null;
                        bloqueado = false;
                    } else {
                        document.getElementById('feedback-memoria').innerText = "No coinciden";
                        document.getElementById('feedback-memoria').className = "mt-6 h-8 text-xl font-bold text-red-400";
                        
                        setTimeout(() => {
                            primeraCarta.el.classList.remove('flipped');
                            segundaCarta.el.classList.remove('flipped');
                            primeraCarta = null;
                            segundaCarta = null;
                            bloqueado = false;
                            document.getElementById('feedback-memoria').innerText = "";
                        }, 1000);
                    }
                }
            }

            setupMemoria();
            window.setupMemoria = setupMemoria;
        }

        // ==================== INICIO ====================
        window.onload = () => {
            initDB();
            navigate('selector');
        };
    </script>
</body>
</html>
